<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#10b981">
  <title>Cashly - Personal Finance</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Color_icon_green.svg/512px-Color_icon_green.svg.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  
  <!-- Babel for JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    
    /* Apple-style spring animations */
    .animate-in { animation: fadeIn 0.2s ease-out forwards; }
    .spring-up { transform: translateY(100%); animation: springUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
    .slide-in-right { transform: translateX(100%); animation: slideInRight 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes springUp { to { transform: translateY(0); } }
    @keyframes slideInRight { to { transform: translateX(0); } }
  </style>
</head>
<body class="bg-black text-gray-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import {
      Wallet, PieChart, Plus, List, Settings, Bell, Coffee, Car, 
      ShoppingBag, Film, FileText, DollarSign, ArrowLeft, Calendar, 
      ChevronLeft, ChevronRight, TrendingDown, TrendingUp, Home, 
      Target, Globe, CreditCard, RefreshCw, ArrowRightLeft,
      Heart, Book, Repeat, Zap, Landmark, Shield, LogOut, ChevronRight as ChevronRightIcon,
      User, HelpCircle, Info, Loader2, Trophy, AlertCircle, Trash2, Rocket
    } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    // --- FIREBASE SETUP ---
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { 
      getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously, 
      signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword,
      GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, enableIndexedDbPersistence
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // Robust Local Storage Wrappers to prevent global execution halts
    const safeLocalGet = (key, fallback) => {
      try {
        const item = window.localStorage.getItem(key);
        if (item === null || item === undefined) return fallback;
        const parsed = JSON.parse(item);
        return parsed !== null && parsed !== undefined ? parsed : fallback;
      } catch (e) {
        return fallback;
      }
    };

    const safeLocalSet = (key, value) => {
      try {
        window.localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
      } catch (e) {
        // Ignore quota/security errors
      }
    };

    const githubFirebaseConfig = {
      apiKey: "AIzaSyDOwnNc4ZOlcomQkyvc2wRcfk1NICBkhQs",
      authDomain: "cashlyapp-25956.firebaseapp.com",
      projectId: "cashlyapp-25956",
      storageBucket: "cashlyapp-25956.firebasestorage.app",
      messagingSenderId: "591724211566",
      appId: "1:591724211566:web:cec1db7bfaf452cc5d257f"
    };

    const getFirebaseConfig = () => {
      if (typeof __firebase_config !== 'undefined') {
        if (typeof __firebase_config === 'string') {
          try { return JSON.parse(__firebase_config); } catch(e) {}
        } else if (typeof __firebase_config === 'object') {
          return __firebase_config;
        }
      }
      return githubFirebaseConfig;
    };

    const firebaseConfig = getFirebaseConfig();
    const appId = (typeof __app_id !== 'undefined') ? __app_id : 'cashly-github-app';

    let app, auth, db;
    try {
      if (firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        try { enableIndexedDbPersistence(db).catch(err => console.warn("Persistence warning:", err.code)); } 
        catch (e) { console.warn("Could not enable offline persistence"); }
      }
    } catch(e) { console.error("Firebase init failed:", e); }

    const isMissingConfig = !auth;

    // --- UI UTILS ---
    const vibrate = () => { if (typeof navigator !== 'undefined' && navigator.vibrate) navigator.vibrate(30); };

    // --- CUSTOM LOGO ---
    const CashlyLogo = ({ className }) => (
      <svg viewBox="0 0 100 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="24" fill="#111" />
        <path d="M20 20 L30 20 M80 20 L80 30 M20 80 L30 80 M80 80 L80 70" stroke="#22c55e" strokeWidth="2" strokeLinecap="round" opacity="0.3"/>
        <path d="M50 25 L50 75" stroke="#4ade80" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M65 35 C 65 25, 35 25, 35 40 C 35 55, 65 55, 65 70 C 65 85, 35 85, 35 85" stroke="#4ade80" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M65 35 L75 25 M75 25 L60 25" stroke="#4ade80" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M35 75 L25 85 M25 85 L40 85" stroke="#4ade80" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    // --- MOCK DATA & CONFIG ---
    const EX_RATES = { USD: 1, EUR: 1.08, GBP: 1.25, JPY: 0.0066, INR: 0.012 };

    const CATEGORIES = {
      food: { id: 'food', name: 'Food & Drink', icon: Coffee, bg: 'bg-orange-500', type: 'expense' },
      transport: { id: 'transport', name: 'Transport', icon: Car, bg: 'bg-blue-500', type: 'expense' },
      shopping: { id: 'shopping', name: 'Shopping', icon: ShoppingBag, bg: 'bg-purple-500', type: 'expense' },
      entertainment: { id: 'entertainment', name: 'Entertainment', icon: Film, bg: 'bg-pink-500', type: 'expense' },
      bills: { id: 'bills', name: 'Bills', icon: FileText, bg: 'bg-rose-500', type: 'expense' },
      home: { id: 'home', name: 'Home', icon: Home, bg: 'bg-indigo-500', type: 'expense' },
      health: { id: 'health', name: 'Health', icon: Heart, bg: 'bg-red-500', type: 'expense' },
      education: { id: 'education', name: 'Education', icon: Book, bg: 'bg-cyan-500', type: 'expense' },
      subscriptions: { id: 'subscriptions', name: 'Subscriptions', icon: Repeat, bg: 'bg-violet-500', type: 'expense' },
      utilities: { id: 'utilities', name: 'Utilities', icon: Zap, bg: 'bg-yellow-500', type: 'expense' },
      salary: { id: 'salary', name: 'Salary', icon: DollarSign, bg: 'bg-emerald-500', type: 'income' },
      gifts: { id: 'gifts', name: 'Gifts', icon: DollarSign, bg: 'bg-teal-500', type: 'income' },
      investment: { id: 'investment', name: 'Investment', icon: Landmark, bg: 'bg-emerald-600', type: 'income' },
    };

    const ICON_MAP = { Wallet, Globe, Target, CreditCard, DollarSign, Trophy, Car, Home };
    const COLOR_MAP = { 'bg-orange-500': '#f97316', 'bg-blue-500': '#3b82f6', 'bg-purple-500': '#a855f7', 'bg-pink-500': '#ec4899', 'bg-rose-500': '#f43f5e', 'bg-indigo-500': '#6366f1', 'bg-red-500': '#ef4444', 'bg-cyan-500': '#06b6d4', 'bg-violet-500': '#8b5cf6', 'bg-yellow-500': '#eab308', 'bg-emerald-500': '#10b981' };

    const formatCurrency = (amount, currencyCode = 'USD') => {
      try {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: currencyCode || 'USD', minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(amount || 0);
      } catch (e) {
        return `$${parseFloat(amount || 0).toFixed(2)}`;
      }
    };

    const formatDateHeader = (dateString) => {
      const date = new Date(dateString);
      const today = new Date();
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      if (date.toDateString() === today.toDateString()) return 'Today';
      if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).format(date);
    };

    // --- MAIN COMPONENT ---
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [authMode, setAuthMode] = useState('welcome'); 
      
      // Initialize states gracefully directly from safe local helpers
      const [transactions, setTransactions] = useState(() => safeLocalGet('cashly_transactions', []));
      const [wallets, setWallets] = useState(() => safeLocalGet('cashly_wallets', [{ id: 'w1', name: 'Main Wallet', currency: 'USD', iconString: 'Wallet' }]));
      const [budgets, setBudgets] = useState(() => safeLocalGet('cashly_budgets', []));
      const [goals, setGoals] = useState(() => safeLocalGet('cashly_goals', []));
      const [bills, setBills] = useState(() => safeLocalGet('cashly_bills', []));
      const [preferences, setPreferences] = useState(() => safeLocalGet('cashly_prefs', { baseCurrency: 'USD', isDarkMode: false, faceId: false, securityPin: null, budgetAlerts: true }));
      
      const [activeWalletId, setActiveWalletId] = useState('all'); 
      const [currentTab, setCurrentTab] = useState('transactions');
      const [currentMonth, setCurrentMonth] = useState(new Date());
      
      const [isAddOpen, setIsAddOpen] = useState(false);
      const [isAddWalletOpen, setIsAddWalletOpen] = useState(false);
      const [isAddBudgetOpen, setIsAddBudgetOpen] = useState(false);
      const [isAddGoalOpen, setIsAddGoalOpen] = useState(false);
      const [isFundGoalOpen, setIsFundGoalOpen] = useState(null); 
      const [isNotifOpen, setIsNotifOpen] = useState(false);
      const [isAddBillOpen, setIsAddBillOpen] = useState(false);

      // SECURITY STATES
      const [isLocked, setIsLocked] = useState(() => {
        const prefs = safeLocalGet('cashly_prefs', {});
        return !!(prefs && prefs.securityPin);
      });
      const [isPinSetupOpen, setIsPinSetupOpen] = useState(false);

      useEffect(() => {
        if (isMissingConfig) {
          // States are already pre-loaded via initializers
          setAuthLoading(false);
          setUser({ uid: 'local', email: 'Local Device Mode', displayName: 'Offline User' });
          setAuthMode('authenticated');
          return;
        }

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
          } catch (err) { console.error('Initial Auth Error', err); setAuthLoading(false); }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          setUser(usr);
          setAuthLoading(false);
          if (!usr) setAuthMode('welcome');
        });
        return () => unsubscribe();
      }, [isMissingConfig]);

      useEffect(() => {
        if (!user || isMissingConfig) return;

        const syncCollection = (collName, setter) => {
          return onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, collName), snap => setter(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => console.error(err));
        };

        const unsubWallets = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'wallets'), async (snap) => {
          if (snap.empty) await setDoc(doc(collection(db, 'artifacts', appId, 'users', user.uid, 'wallets'), 'w1'), { name: 'Main Wallet', currency: 'USD', iconString: 'Wallet' });
          else setWallets(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });

        const unsubPrefs = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'preferences'), (doc) => {
          if (doc.exists()) setPreferences(doc.data());
        });

        const unsubTx = syncCollection('transactions', setTransactions);
        const unsubBg = syncCollection('budgets', setBudgets);
        const unsubGl = syncCollection('goals', setGoals);
        const unsubBl = syncCollection('bills', setBills);

        return () => { unsubWallets(); unsubPrefs(); unsubTx(); unsubBg(); unsubGl(); unsubBl(); };
      }, [user, isMissingConfig]);

      const activeWallet = activeWalletId === 'all' ? { id: 'all', name: 'All Wallets', currency: preferences?.baseCurrency || 'USD' } : wallets.find(w => w.id === activeWalletId) || wallets[0] || { name: 'Loading...', currency: 'USD' };
      
      const cycleWallet = () => {
        vibrate();
        if (wallets.length === 0) return;
        const sequence = ['all', ...wallets.map(w => w.id)];
        setActiveWalletId(sequence[(sequence.indexOf(activeWalletId) + 1) % sequence.length]);
      };

      const viewTransactions = useMemo(() => transactions.filter(t => activeWalletId === 'all' || (t.type === 'transfer' ? t.fromWalletId === activeWalletId || t.toWalletId === activeWalletId : t.walletId === activeWalletId)), [transactions, activeWalletId]);
      
      const monthTransactions = useMemo(() => viewTransactions.filter(t => {
        const tDate = new Date(t.date); return tDate.getMonth() === currentMonth.getMonth() && tDate.getFullYear() === currentMonth.getFullYear();
      }).sort((a, b) => new Date(b.date) - new Date(a.date)), [viewTransactions, currentMonth]);

      const { totalIncome, totalExpense, balance } = useMemo(() => {
        let inc = 0, exp = 0, bal = 0;
        const convert = (amt, wId) => activeWalletId === 'all' ? amt * (EX_RATES[wallets.find(w=>w.id===wId)?.currency] || 1) : amt;
        
        viewTransactions.forEach(t => {
          let amt = t.type !== 'transfer' ? convert(t.amount, t.walletId) : 0;
          if (t.type === 'income') bal += amt;
          if (t.type === 'expense') bal -= amt;
          if (t.type === 'transfer' && activeWalletId !== 'all') {
             if (t.fromWalletId === activeWalletId) bal -= t.amount;
             if (t.toWalletId === activeWalletId) bal += (t.amountConverted || t.amount);
          }
        });

        monthTransactions.forEach(t => {
          let amt = t.type !== 'transfer' ? convert(t.amount, t.walletId) : 0;
          if (t.type === 'income') inc += amt;
          if (t.type === 'expense') exp += amt;
          if (t.type === 'transfer' && activeWalletId !== 'all') {
             if (t.fromWalletId === activeWalletId) exp += t.amount;
             if (t.toWalletId === activeWalletId) inc += (t.amountConverted || t.amount);
          }
        });
        return { totalIncome: inc, totalExpense: exp, balance: bal };
      }, [viewTransactions, monthTransactions, activeWalletId, wallets, preferences?.baseCurrency]);

      const upcomingBills = useMemo(() => {
        const today = new Date();
        return bills.filter(bill => {
          let billDate = new Date(today.getFullYear(), today.getMonth(), bill.dueDate);
          if (billDate < today) billDate.setMonth(billDate.getMonth() + 1);
          const diffDays = Math.ceil(Math.abs(billDate - today) / (1000 * 60 * 60 * 24));
          return diffDays <= 7;
        }).sort((a,b) => a.dueDate - b.dueDate);
      }, [bills]);

      const saveToFirebase = async (collectionName, data, id = null) => {
        if (isMissingConfig) {
          const newData = { ...data, id: id || Date.now().toString() };
          if (collectionName === 'transactions') { setTransactions(p => { const n = [newData, ...p]; safeLocalSet('cashly_transactions', n); return n; }); }
          if (collectionName === 'wallets') { setWallets(p => { const n = [...p, newData]; safeLocalSet('cashly_wallets', n); return n; }); }
          if (collectionName === 'budgets') { setBudgets(p => { const n = [...p, newData]; safeLocalSet('cashly_budgets', n); return n; }); }
          if (collectionName === 'goals') { setGoals(p => { const n = id ? p.map(g => g.id === id ? {...g, ...data} : g) : [...p, newData]; safeLocalSet('cashly_goals', n); return n; }); }
          if (collectionName === 'bills') { setBills(p => { const n = [...p, newData]; safeLocalSet('cashly_bills', n); return n; }); }
          return;
        }

        if (!user) return;
        try {
          const ref = id ? doc(db, 'artifacts', appId, 'users', user.uid, collectionName, id) : doc(collection(db, 'artifacts', appId, 'users', user.uid, collectionName));
          await setDoc(ref, { ...data, id: ref.id }, { merge: true });
        } catch (err) { console.error(`Error saving ${collectionName}`, err); }
      };

      const deleteFromFirebase = async (collectionName, id) => {
        if (isMissingConfig) {
          if (collectionName === 'wallets') { setWallets(p => { const n = p.filter(w => w.id !== id); safeLocalSet('cashly_wallets', n); return n; }); }
          return;
        }
        if (!user) return;
        try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, collectionName, id)); } 
        catch (err) { console.error(`Error deleting ${collectionName}`, err); }
      };

      const updatePreference = (key, value) => {
        setPreferences(p => { 
          const next = { ...p, [key]: value }; 
          if (isMissingConfig) safeLocalSet('cashly_prefs', next); 
          return next; 
        });
        if (!isMissingConfig) saveToFirebase('settings', { [key]: value }, 'preferences');
      };

      const getHeaderStyle = () => {
        if (activeWalletId === 'all') return 'bg-gradient-to-br from-gray-900 to-gray-800 dark:from-black dark:to-gray-950';
        if (currentTab === 'planning') return 'bg-gradient-to-br from-indigo-600 to-purple-600 dark:from-indigo-900 dark:to-purple-900';
        if (currentTab === 'settings') return 'bg-[#F2F2F7] dark:bg-black text-gray-900 dark:text-white';
        return 'bg-gradient-to-br from-emerald-500 to-teal-600 dark:from-emerald-800 dark:to-teal-900';
      };

      return (
        <div className={preferences?.isDarkMode ? 'dark' : ''}>
          <div className="min-h-screen bg-black sm:bg-gray-900 dark:sm:bg-black flex items-center justify-center font-sans sm:p-4 text-gray-900 dark:text-white transition-colors duration-300 overflow-y-auto">
            
            {authLoading ? (
              <div className="w-full max-w-md h-[100dvh] sm:h-[100vh] sm:max-h-[850px] sm:rounded-[40px] bg-emerald-500 flex items-center justify-center shadow-2xl">
                <Loader2 className="w-12 h-12 text-white animate-spin" />
              </div>
            ) : (
              <div className="w-full max-w-md h-[100dvh] sm:h-[100vh] sm:max-h-[850px] sm:rounded-[40px] sm:border-[8px] border-gray-800 dark:border-gray-700 bg-[#F2F2F7] dark:bg-black overflow-hidden relative flex flex-col shadow-2xl transition-colors duration-300">
                
                {isLocked ? (
                  <LockScreen pin={preferences?.securityPin} onUnlock={() => setIsLocked(false)} />
                ) : (
                  <>
                    {!user && authMode === 'welcome' && <WelcomeScreen onNavigate={(m) => {vibrate(); setAuthMode(m)}} />}
                    {!user && authMode === 'signup' && <SignUpScreen onNavigate={(m) => {vibrate(); setAuthMode(m)}} auth={auth} />}
                    {!user && authMode === 'login' && <LoginScreen onNavigate={(m) => {vibrate(); setAuthMode(m)}} auth={auth} />}
                    
                    {user && (
                      <>
                        <div className={`${getHeaderStyle()} pt-14 pb-6 px-6 ${currentTab === 'settings' ? 'text-gray-900 dark:text-white' : 'text-white'} rounded-b-[2rem] shadow-sm z-10 flex-shrink-0 transition-colors duration-500 relative overflow-hidden`}>
                          <div className="flex justify-between items-center mb-6 relative z-10">
                            <div 
                              onClick={currentTab === 'transactions' || currentTab === 'planning' ? cycleWallet : undefined}
                              className={`flex items-center gap-2 py-1.5 px-3 rounded-full transition-all ${(currentTab === 'transactions' || currentTab === 'planning') ? (currentTab === 'settings' ? 'bg-black/5 dark:bg-white/10 hover:bg-black/10' : 'bg-white/20 hover:bg-white/30') + ' cursor-pointer backdrop-blur-md active:scale-95' : 'bg-transparent'}`}
                            >
                              {(currentTab === 'transactions' || currentTab === 'planning') ? <RefreshCw className="w-4 h-4" /> : <Wallet className="w-4 h-4" />}
                              <span className="font-semibold text-sm truncate max-w-[120px]">
                                {currentTab === 'settings' ? 'Settings' : activeWallet.name}
                              </span>
                            </div>
                            {currentTab !== 'settings' && (
                              <button onClick={() => {vibrate(); setIsNotifOpen(true)}} className="p-2 hover:bg-white/20 rounded-full transition-colors relative active:scale-90">
                                <Bell className="w-5 h-5" />
                                {upcomingBills.length > 0 && <span className="absolute top-1 right-2 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-transparent animate-pulse"></span>}
                              </button>
                            )}
                          </div>

                          {currentTab !== 'settings' && (
                            <div className="text-center mb-4 relative z-10 animate-in fade-in">
                              <p className="opacity-80 text-sm font-medium mb-1">
                                {currentTab === 'planning' ? 'Total Planning Pool' : 'Total Balance'}
                              </p>
                              <h1 className="text-4xl font-bold tracking-tight">
                                {formatCurrency(balance, activeWallet.currency)}
                              </h1>
                            </div>
                          )}

                          {currentTab === 'transactions' && (
                            <div className="flex justify-between items-center bg-black/10 dark:bg-white/5 rounded-2xl p-4 mt-6 backdrop-blur-md border border-white/10 dark:border-white/5 animate-in slide-in-right">
                              <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shadow-inner">
                                  <TrendingDown className="w-5 h-5 text-white" />
                                </div>
                                <div>
                                  <p className="text-white/80 text-xs font-medium">Income</p>
                                  <p className="font-semibold">{formatCurrency(totalIncome, activeWallet.currency)}</p>
                                </div>
                              </div>
                              <div className="w-px h-8 bg-white/20"></div>
                              <div className="flex items-center gap-3">
                                <div>
                                  <p className="text-white/80 text-xs font-medium text-right">Expenses</p>
                                  <p className="font-semibold">{formatCurrency(totalExpense, activeWallet.currency)}</p>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shadow-inner">
                                  <TrendingUp className="w-5 h-5 text-white" />
                                </div>
                              </div>
                            </div>
                          )}
                        </div>

                        {isMissingConfig && (
                          <div className="bg-orange-500 text-white text-xs font-bold p-2 text-center shadow-sm">
                            Running in offline browser mode (No cloud sync).
                          </div>
                        )}

                        {currentTab !== 'settings' && (
                          <div className="flex items-center justify-between px-6 py-4 bg-[#F2F2F7] dark:bg-black border-b border-gray-200/60 dark:border-[#2C2C2E] flex-shrink-0 z-0">
                            <button onClick={() => {vibrate(); setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))}} className="p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full transition-colors active:scale-90">
                              <ChevronLeft className="w-5 h-5 text-gray-500 dark:text-gray-400" />
                            </button>
                            <span className="font-semibold text-gray-700 dark:text-gray-300">
                              {new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentMonth)}
                            </span>
                            <button onClick={() => {vibrate(); setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))}} className="p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-full transition-colors active:scale-90">
                              <ChevronRight className="w-5 h-5 text-gray-500 dark:text-gray-400" />
                            </button>
                          </div>
                        )}

                        <div className="flex-1 overflow-y-auto pb-28 relative z-0">
                          {currentTab === 'transactions' && (
                            <RecordsView transactions={monthTransactions} currency={activeWallet.currency} formatCurrency={formatCurrency} wallets={wallets} activeWalletId={activeWalletId} onAdd={() => setIsAddOpen(true)} />
                          )}
                          {currentTab === 'analytics' && (
                            <AnalyticsView transactions={monthTransactions} totalExpense={totalExpense} currency={activeWallet.currency} formatCurrency={formatCurrency} />
                          )}
                          {currentTab === 'planning' && (
                            <PlanningView transactions={monthTransactions} budgets={budgets.filter(b=>activeWalletId==='all'||b.walletId===activeWalletId)} goals={goals} currency={activeWallet.currency} formatCurrency={formatCurrency} onAddBudget={() => {vibrate(); setIsAddBudgetOpen(true)}} onAddGoal={() => {vibrate(); setIsAddGoalOpen(true)}} onFundGoal={(g) => {vibrate(); setIsFundGoalOpen(g)}} />
                          )}
                          {currentTab === 'settings' && (
                            <SettingsView user={user} wallets={wallets} prefs={preferences || {}} setPref={updatePreference} onAddWallet={() => {vibrate(); setIsAddWalletOpen(true)}} onDeleteWallet={(id) => { deleteFromFirebase('wallets', id); if(activeWalletId === id) setActiveWalletId('all'); }} onLogout={() => {vibrate(); auth ? signOut(auth) : setAuthMode('welcome')}} onEnableSecurity={() => {vibrate(); setIsPinSetupOpen(true)}} />
                          )}
                        </div>

                        <div className="absolute bottom-0 w-full bg-white/70 dark:bg-[#1C1C1E]/80 saturate-150 backdrop-blur-xl border-t border-gray-200/50 dark:border-[#2C2C2E]/50 pb-safe sm:pb-0 px-6 h-24 flex items-center justify-between z-20">
                          <NavItem icon={List} label="Records" active={currentTab === 'transactions'} onClick={() => {vibrate(); setCurrentTab('transactions')}} />
                          <NavItem icon={PieChart} label="Analytics" active={currentTab === 'analytics'} onClick={() => {vibrate(); setCurrentTab('analytics')}} />
                          <div className="w-16"></div>
                          <NavItem icon={Target} label="Planning" active={currentTab === 'planning'} onClick={() => {vibrate(); setCurrentTab('planning')}} />
                          <NavItem icon={Settings} label="Settings" active={currentTab === 'settings'} onClick={() => {vibrate(); setCurrentTab('settings')}} />
                          
                          {/* Polished Layered FAB */}
                          <div className="absolute -top-8 left-1/2 -translate-x-1/2 z-30">
                            <div className="w-[76px] h-[76px] rounded-full bg-emerald-400/20 dark:bg-emerald-500/20 p-2 flex items-center justify-center backdrop-blur-xl">
                              <button onClick={() => { vibrate(); setIsAddOpen(true); }} className="w-full h-full bg-emerald-400 dark:bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-[0_4px_15px_rgba(52,211,153,0.5)] active:scale-90 transition-all duration-300">
                                <Plus className="w-8 h-8" strokeWidth={2.5} />
                              </button>
                            </div>
                          </div>
                        </div>

                        <AddTransactionModal isOpen={isAddOpen} onClose={() => setIsAddOpen(false)} onSave={(data) => saveToFirebase('transactions', data)} wallets={wallets} initialWalletId={activeWalletId === 'all' ? (wallets[0]?.id || '') : activeWalletId} />
                        <AddWalletModal isOpen={isAddWalletOpen} onClose={() => setIsAddWalletOpen(false)} onSave={(data) => saveToFirebase('wallets', data)} />
                        <AddBudgetModal isOpen={isAddBudgetOpen} onClose={() => setIsAddBudgetOpen(false)} onSave={(data) => saveToFirebase('budgets', data)} wallets={wallets} activeWalletId={activeWalletId} />
                        <AddGoalModal isOpen={isAddGoalOpen} onClose={() => setIsAddGoalOpen(false)} onSave={(data) => saveToFirebase('goals', data)} />
                        <FundGoalModal goal={isFundGoalOpen} onClose={() => setIsFundGoalOpen(null)} onSave={(id, newAmount) => saveToFirebase('goals', { currentAmount: newAmount }, id)} formatCurrency={formatCurrency} currency={activeWallet.currency} />
                        <NotificationsModal isOpen={isNotifOpen} onClose={() => setIsNotifOpen(false)} bills={upcomingBills} allBills={bills} onAddBill={() => { setIsNotifOpen(false); setIsAddBillOpen(true); }} formatCurrency={formatCurrency} currency={activeWallet.currency} />
                        <AddBillModal isOpen={isAddBillOpen} onClose={() => setIsAddBillOpen(false)} onSave={(data) => saveToFirebase('bills', data)} />
                        <PinSetupModal isOpen={isPinSetupOpen} onClose={() => setIsPinSetupOpen(false)} onSave={(pin) => { updatePreference('securityPin', pin); updatePreference('faceId', true); setIsPinSetupOpen(false); }} />
                      </>
                    )}
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- REUSABLE EMPTY STATE ---
    function EmptyState({ icon: Icon, title, subtitle, actionLabel, onAction, color }) {
      return (
        <div className="h-full flex flex-col items-center justify-center text-center space-y-6 pt-16 px-6 animate-in">
          <div className={`w-28 h-28 rounded-full ${color} flex items-center justify-center shadow-lg ring-8 ring-white/50 dark:ring-black/20`}>
            <Icon className="w-12 h-12 text-white" />
          </div>
          <div>
            <h3 className="text-xl font-black text-gray-900 dark:text-white mb-2">{title}</h3>
            <p className="text-[15px] font-medium text-gray-500 dark:text-gray-400">{subtitle}</p>
          </div>
          {actionLabel && (
            <button onClick={() => { vibrate(); onAction(); }} className="px-8 py-3.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-bold rounded-2xl shadow-lg active:scale-95 transition-all duration-300">
              {actionLabel}
            </button>
          )}
        </div>
      );
    }

    // --- CUSTOM CONFIRM MODAL ---
    function ConfirmDialog({ isOpen, onClose, onConfirm, title, message, isDestructive }) {
      if (!isOpen) return null;
      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-in" onClick={onClose}>
          <div className="bg-white dark:bg-[#1C1C1E] rounded-3xl w-full max-w-[300px] shadow-2xl overflow-hidden flex flex-col text-center" onClick={e => e.stopPropagation()}>
            <div className="p-6">
              <h3 className="font-bold text-xl text-gray-900 dark:text-white mb-2">{title}</h3>
              <p className="text-sm text-gray-500 dark:text-gray-400">{message}</p>
            </div>
            <div className="flex border-t border-gray-100 dark:border-[#2C2C2E]">
              <button onClick={onClose} className="flex-1 py-4 font-bold text-gray-600 dark:text-gray-300 border-r border-gray-100 dark:border-[#2C2C2E] hover:bg-gray-50 dark:hover:bg-[#2C2C2E] active:bg-gray-100">Cancel</button>
              <button onClick={() => { vibrate(); onConfirm(); onClose(); }} className={`flex-1 py-4 font-bold hover:bg-gray-50 dark:hover:bg-[#2C2C2E] active:bg-gray-100 ${isDestructive ? 'text-rose-500' : 'text-emerald-500'}`}>Confirm</button>
            </div>
          </div>
        </div>
      );
    }

    // --- TAB VIEWS ---
    function RecordsView({ transactions, currency, formatCurrency, wallets, activeWalletId, onAdd }) {
      const groupedTransactions = useMemo(() => {
        const groups = {};
        transactions.forEach(t => {
          const dateKey = new Date(t.date).toDateString();
          if (!groups[dateKey]) groups[dateKey] = { date: t.date, items: [], total: 0 };
          groups[dateKey].items.push(t);
          let amount = t.amount;
          if (activeWalletId === 'all' && t.type !== 'transfer') {
            const w = wallets.find(w => w.id === t.walletId);
            amount = t.amount * (EX_RATES[w?.currency] || 1);
            groups[dateKey].total += t.type === 'expense' ? -amount : amount;
          } else if (activeWalletId !== 'all') {
            if (t.type === 'transfer') {
                if (t.fromWalletId === activeWalletId) groups[dateKey].total -= t.amount;
                if (t.toWalletId === activeWalletId) groups[dateKey].total += (t.amountConverted || t.amount);
            } else groups[dateKey].total += t.type === 'expense' ? -amount : amount;
          }
        });
        return Object.values(groups).sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [transactions, activeWalletId, wallets]);

      if (groupedTransactions.length === 0) {
        return <EmptyState icon={Rocket} color="bg-gradient-to-br from-emerald-400 to-teal-500" title="Nothing here yet!" subtitle="Your financial journey starts with a single step. Add an expense or income." actionLabel="Add Transaction" onAction={onAdd} />;
      }

      return (
        <div className="px-4 py-4 space-y-6">
          {groupedTransactions.map((group, index) => (
            <div key={index} className="animate-in" style={{ animationDelay: `${index * 50}ms`, animationFillMode: 'both' }}>
              <div className="flex justify-between items-center px-2 mb-2">
                <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">{formatDateHeader(group.date)}</span>
                <span className="text-xs font-bold text-gray-400">{group.total > 0 ? '+' : ''}{formatCurrency(group.total, currency)}</span>
              </div>
              <div className="bg-white dark:bg-[#1C1C1E] rounded-3xl shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 dark:border-[#2C2C2E] overflow-hidden transition-colors duration-300">
                {group.items.map((tx, i) => {
                  const isTransfer = tx.type === 'transfer';
                  const category = isTransfer ? null : CATEGORIES[tx.categoryId];
                  let displayAmount = tx.amount, isPositive = tx.type === 'income';
                  if (isTransfer) {
                    if (activeWalletId === 'all') { displayAmount = tx.amount; isPositive = false; } 
                    else { isPositive = tx.toWalletId === activeWalletId; displayAmount = isPositive ? (tx.amountConverted || tx.amount) : tx.amount; }
                  }
                  return (
                    <div key={tx.id} className={`flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-[#2C2C2E] cursor-pointer transition-colors group ${i !== group.items.length - 1 ? 'border-b border-gray-50 dark:border-[#2C2C2E]' : ''}`}>
                      <div className="flex items-center gap-4">
                        {isTransfer ? (
                          <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 group-hover:scale-105 transition-transform"><ArrowRightLeft className="w-6 h-6" /></div>
                        ) : (
                          <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-sm ${category?.bg} group-hover:scale-105 transition-transform`}>{category && <category.icon className="w-6 h-6" />}</div>
                        )}
                        <div>
                          <p className="font-semibold text-gray-900 dark:text-gray-100 text-[15px]">{isTransfer ? 'Transfer' : category?.name}</p>
                          {activeWalletId === 'all' && <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5 font-medium">{wallets.find(w => w.id === tx.walletId)?.name || 'Transfer'}</p>}
                          {tx.note && <p className="text-xs text-gray-400 mt-0.5">{tx.note}</p>}
                        </div>
                      </div>
                      <span className={`font-semibold text-[15px] ${isTransfer ? (isPositive ? 'text-emerald-500' : 'text-gray-900 dark:text-white') : (tx.type === 'income' ? 'text-emerald-500' : 'text-gray-900 dark:text-white')}`}>
                        {isPositive ? '+' : '-'}{formatCurrency(displayAmount, activeWalletId === 'all' && !isTransfer ? wallets.find(w=>w.id===tx.walletId)?.currency : currency)}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function AnalyticsView({ transactions, totalExpense, currency, formatCurrency }) {
      const analyticsData = useMemo(() => {
        const expenses = transactions.filter(t => t.type === 'expense');
        const categoryTotals = {};
        expenses.forEach(t => { if (!categoryTotals[t.categoryId]) categoryTotals[t.categoryId] = 0; categoryTotals[t.categoryId] += t.amount; });
        return Object.keys(categoryTotals).map(catId => {
          const amount = categoryTotals[catId];
          return { ...CATEGORIES[catId], amount, percentage: totalExpense > 0 ? (amount / totalExpense) * 100 : 0 };
        }).sort((a, b) => b.amount - a.amount);
      }, [transactions, totalExpense]);

      if (analyticsData.length === 0) {
        return <EmptyState icon={PieChart} color="bg-gradient-to-br from-gray-400 to-gray-600" title="No Data to Analyze" subtitle="Keep logging your expenses to unlock beautiful insights." />;
      }

      return (
        <div className="px-4 py-6 space-y-8 animate-in duration-500">
          <div className="bg-white dark:bg-[#1C1C1E] rounded-3xl p-6 shadow-[0_2px_15px_rgba(0,0,0,0.03)] border border-gray-100 dark:border-[#2C2C2E] flex flex-col items-center justify-center h-64 relative transition-colors duration-300">
            <div className="absolute inset-0 flex flex-col items-center justify-center z-10">
               <span className="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1">Total Expenses</span>
               <span className="text-3xl font-bold text-gray-900 dark:text-white">{formatCurrency(totalExpense, currency)}</span>
            </div>
            <svg width="200" height="200" viewBox="0 0 200 200" className="transform -rotate-90 drop-shadow-md">
              <circle cx="100" cy="100" r="80" fill="transparent" stroke="currentColor" className="text-gray-100 dark:text-gray-800" strokeWidth="18" />
              {(() => {
                let currentOffset = 0; const circumference = 2 * Math.PI * 80;
                return analyticsData.map((data, i) => {
                  const segmentLength = (data.percentage / 100) * circumference;
                  const gap = analyticsData.length > 1 && data.percentage < 100 ? 6 : 0;
                  const activeLength = Math.max(0, segmentLength - gap);
                  const offsetToApply = currentOffset; currentOffset += segmentLength;
                  return (
                    <circle key={i} cx="100" cy="100" r="80" fill="transparent" stroke={COLOR_MAP[data.bg] || '#10b981'} strokeWidth="18" strokeDasharray={`${activeLength} ${circumference}`} strokeDashoffset={0} strokeLinecap="round" transform={`rotate(${(offsetToApply / circumference) * 360} 100 100)`} className="transition-all duration-1000 ease-out animate-in fade-in" style={{ animationDelay: `${i * 0.1}s` }} />
                  );
                });
              })()}
            </svg>
          </div>
          <div className="space-y-3">
            <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider px-2">Top Spending</h3>
            <div className="bg-white dark:bg-[#1C1C1E] rounded-3xl shadow-[0_2px_10px_rgba(0,0,0,0.03)] border border-gray-100 dark:border-[#2C2C2E] overflow-hidden divide-y divide-gray-50 dark:divide-[#2C2C2E] transition-colors duration-300">
              {analyticsData.map((data, i) => {
                const Icon = data.icon || HelpCircle;
                return (
                  <div key={i} className="flex items-center gap-4 p-4">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-white flex-shrink-0 ${data.bg}`}><Icon className="w-5 h-5" /></div>
                    <div className="flex-1 min-w-0">
                      <div className="flex justify-between items-end mb-1.5">
                        <span className="font-semibold text-gray-900 dark:text-gray-100 text-[15px] truncate">{data.name}</span>
                        <span className="font-semibold text-gray-900 dark:text-gray-100">{formatCurrency(data.amount, currency)}</span>
                      </div>
                      <div className="h-1.5 w-full bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
                        <div className={`h-full rounded-full ${data.bg}`} style={{ width: `${data.percentage}%` }}></div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function PlanningView({ transactions, budgets, goals, currency, formatCurrency, onAddBudget, onAddGoal, onFundGoal }) {
      const [mode, setMode] = useState('budgets');

      const budgetStats = useMemo(() => budgets.map(budget => {
        const spent = transactions.filter(t => t.categoryId === budget.categoryId && t.type === 'expense' && (t.walletId === budget.walletId || budget.walletId === 'all')).reduce((sum, t) => sum + t.amount, 0);
        const percentage = Math.min((spent / budget.limit) * 100, 100);
        const categoryData = CATEGORIES[budget.categoryId] || { name: 'Unknown', icon: HelpCircle, bg: 'bg-gray-500' };
        return { ...budget, spent, percentage, category: categoryData, statusColor: percentage >= 100 ? 'bg-rose-500' : percentage > 80 ? 'bg-orange-500' : 'bg-emerald-500' };
      }), [transactions, budgets]);

      return (
        <div className="px-4 py-6 space-y-6 animate-in fade-in duration-300">
          <div className="flex bg-gray-200/50 dark:bg-[#1C1C1E] p-1 rounded-xl shadow-inner">
            <button onClick={() => {vibrate(); setMode('budgets')}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${mode === 'budgets' ? 'bg-white dark:bg-[#2C2C2E] text-gray-900 dark:text-white shadow-sm' : 'text-gray-500'}`}>Budgets</button>
            <button onClick={() => {vibrate(); setMode('goals')}} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${mode === 'goals' ? 'bg-white dark:bg-[#2C2C2E] text-gray-900 dark:text-white shadow-sm' : 'text-gray-500'}`}>Savings Jars</button>
          </div>

          {mode === 'budgets' && (
            <div className="space-y-4 animate-in slide-in-from-right-4 duration-300">
              {budgetStats.length === 0 ? (
                <EmptyState icon={Target} color="bg-gradient-to-br from-indigo-400 to-purple-600" title="Control your spending" subtitle="Set monthly limits on categories so you never overspend again." actionLabel="Create Budget" onAction={onAddBudget} />
              ) : (
                <>
                  <div className="flex justify-between items-center px-2 mb-2"><h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider">Monthly Budgets</h3><button onClick={onAddBudget} className="text-sm font-bold text-indigo-600 hover:text-indigo-700 flex items-center gap-1 active:scale-95"><Plus className="w-4 h-4" /> Add</button></div>
                  {budgetStats.map((b, i) => (
                    <div key={i} className="bg-white dark:bg-[#1C1C1E] p-5 rounded-3xl shadow-sm border border-gray-100 dark:border-[#2C2C2E] relative overflow-hidden transition-colors">
                      {b.percentage >= 100 && <div className="absolute top-0 left-0 w-full h-1.5 bg-rose-500"></div>}
                      <div className="flex justify-between items-start mb-5">
                        <div className="flex items-center gap-3">
                          <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-sm ${b.category.bg}`}><b.category.icon className="w-6 h-6" /></div>
                          <div><h3 className="font-bold text-gray-900 dark:text-white text-[15px]">{b.category.name}</h3><p className="text-xs text-gray-400 font-medium mt-0.5">Monthly Limit</p></div>
                        </div>
                        <div className="text-right">
                          <p className={`font-bold text-lg ${b.percentage >= 100 ? 'text-rose-500' : 'text-gray-900 dark:text-white'}`}>{formatCurrency(b.spent, currency)}</p>
                          <p className="text-xs text-gray-400 font-medium mt-0.5">of {formatCurrency(b.limit, currency)}</p>
                        </div>
                      </div>
                      <div className="space-y-2">
                        <div className="flex justify-between text-[11px] font-bold px-1 uppercase tracking-wider">
                          <span className="text-gray-400">{b.percentage.toFixed(0)}% Spent</span>
                          <span className={b.percentage >= 100 ? 'text-rose-500' : 'text-emerald-500'}>{b.percentage >= 100 ? 'Over Limit' : `${formatCurrency(b.limit - b.spent, currency)} Left`}</span>
                        </div>
                        <div className="h-3 w-full bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden shadow-inner">
                          <div className={`h-full rounded-full ${b.statusColor} transition-all duration-700 ease-out`} style={{ width: `${b.percentage}%` }}></div>
                        </div>
                      </div>
                    </div>
                  ))}
                </>
              )}
            </div>
          )}

          {mode === 'goals' && (
            <div className="space-y-4 animate-in slide-in-from-left-4 duration-300">
              {goals.length === 0 ? (
                <EmptyState icon={Trophy} color="bg-gradient-to-br from-yellow-400 to-orange-500" title="Dream Big!" subtitle="Set up a savings jar for that new laptop, vacation, or emergency fund." actionLabel="Create Jar" onAction={onAddGoal} />
              ) : (
                <>
                  <div className="flex justify-between items-center px-2 mb-2"><h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider">Savings Jars</h3><button onClick={onAddGoal} className="text-sm font-bold text-indigo-600 hover:text-indigo-700 flex items-center gap-1 active:scale-95"><Plus className="w-4 h-4" /> Create</button></div>
                  {goals.map((g, i) => {
                    const percentage = Math.min((g.currentAmount / g.targetAmount) * 100, 100);
                    return (
                      <div key={i} className="bg-white dark:bg-[#1C1C1E] p-5 rounded-3xl shadow-sm border border-gray-100 dark:border-[#2C2C2E] transition-colors group">
                        <div className="flex justify-between items-start mb-4">
                          <div className="flex items-center gap-3">
                            <div className="text-3xl bg-gray-50 dark:bg-gray-800 w-12 h-12 rounded-2xl flex items-center justify-center">{g.icon}</div>
                            <div><h3 className="font-bold text-gray-900 dark:text-white text-[15px]">{g.name}</h3></div>
                          </div>
                          <button onClick={() => onFundGoal(g)} className="px-3 py-1.5 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 text-xs font-bold rounded-full hover:bg-indigo-100 transition-colors active:scale-95">Add Funds</button>
                        </div>
                        <div className="space-y-2">
                          <div className="flex justify-between text-[11px] font-bold px-1 uppercase tracking-wider">
                            <span className="text-indigo-500">{formatCurrency(g.currentAmount, currency)}</span>
                            <span className="text-gray-400">{formatCurrency(g.targetAmount, currency)}</span>
                          </div>
                          <div className="h-4 w-full bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden shadow-inner p-0.5">
                            <div className={`h-full rounded-full bg-gradient-to-r ${g.color} transition-all duration-700 ease-out relative`} style={{ width: `${Math.max(percentage, 5)}%` }}>
                              {percentage >= 100 && <div className="absolute inset-0 bg-white/20 animate-pulse"></div>}
                            </div>
                          </div>
                          {percentage >= 100 && <p className="text-xs text-center text-emerald-500 font-bold pt-2 animate-bounce">Goal Reached! 🎉</p>}
                        </div>
                      </div>
                    );
                  })}
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    function SettingsView({ user, wallets, prefs, setPref, onAddWallet, onDeleteWallet, onLogout, onEnableSecurity }) {
      const [activeModal, setActiveModal] = useState(null);

    // --- SECURITY & LOCK SCREENS ---
    function LockScreen({ pin, onUnlock }) {
      const [input, setInput] = useState('');
      const [error, setError] = useState(false);

      useEffect(() => {
        if (input.length === 4) {
          if (input === pin) { setInput(''); onUnlock(); }
          else { vibrate(); setError(true); setTimeout(() => { setInput(''); setError(false); }, 500); }
        }
      }, [input, pin, onUnlock]);

      const handleBiometric = async () => {
         try {
            if (window.PublicKeyCredential) {
              const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
              await navigator.credentials.create({
                publicKey: {
                  challenge,
                  rp: { name: "Cashly Finance" },
                  user: { id: new Uint8Array(16), name: "user", displayName: "User" },
                  pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                  authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                  timeout: 60000
                }
              });
              onUnlock();
            }
         } catch(e) { console.log("Biometric failed, use PIN", e); }
      };

      useEffect(() => { handleBiometric(); }, []);

      return (
         <div className="w-full h-full bg-[#F2F2F7] dark:bg-black flex flex-col items-center justify-center p-6 relative animate-in fade-in z-50">
            <div className="absolute top-20 flex flex-col items-center"><CashlyLogo className="w-20 h-20 shadow-lg mb-6" /><h2 className="text-xl font-bold text-center text-gray-900 dark:text-white">Enter PIN</h2></div>
            <div className="flex gap-4 mb-16 mt-20">
               {[0,1,2,3].map(i => <div key={i} className={`w-4 h-4 rounded-full transition-colors ${input.length > i ? 'bg-emerald-500' : 'bg-gray-300 dark:bg-gray-700'} ${error ? 'bg-rose-500' : ''}`} style={error ? {animation: 'springUp 0.3s'} : {}} />)}
            </div>
            <div className="grid grid-cols-3 gap-6 w-full max-w-[280px]">
               {[1,2,3,4,5,6,7,8,9].map(num => (
                 <button key={num} onClick={() => {vibrate(); setInput(p => p.length < 4 ? p + num : p)}} className="w-20 h-20 rounded-full bg-white dark:bg-[#1C1C1E] text-3xl font-medium text-gray-900 dark:text-white shadow-sm active:bg-gray-200 dark:active:bg-gray-800 transition-colors flex items-center justify-center">{num}</button>
               ))}
               <button onClick={() => {vibrate(); handleBiometric();}} className="w-20 h-20 flex items-center justify-center text-emerald-500 active:scale-90 transition-transform"><Shield className="w-8 h-8" /></button>
               <button onClick={() => {vibrate(); setInput(p => p.length < 4 ? p + '0' : p)}} className="w-20 h-20 rounded-full bg-white dark:bg-[#1C1C1E] text-3xl font-medium text-gray-900 dark:text-white shadow-sm active:bg-gray-200 dark:active:bg-gray-800 transition-colors flex items-center justify-center">0</button>
               <button onClick={() => {vibrate(); setInput(p => p.slice(0, -1))}} className="w-20 h-20 flex items-center justify-center text-gray-500 dark:text-gray-400 active:scale-90 transition-transform"><ArrowLeft className="w-8 h-8" /></button>
            </div>
         </div>
      );
    }

    function PinSetupModal({ isOpen, onClose, onSave }) {
      const [step, setStep] = useState(1);
      const [pin1, setPin1] = useState('');
      const [pin2, setPin2] = useState('');
      const [error, setError] = useState(false);
      
      const currentPin = step === 1 ? pin1 : pin2;
      const setPin = step === 1 ? setPin1 : setPin2;

      useEffect(() => {
         if (currentPin.length === 4) {
           setTimeout(() => {
             if (step === 1) { setStep(2); vibrate(); }
             else {
                if (pin1 === pin2) onSave(pin1);
                else { vibrate(); setError(true); setTimeout(() => { setPin1(''); setPin2(''); setStep(1); setError(false); }, 800); }
             }
           }, 200);

            <div className="space-y-4"><input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email Address" className="w-full bg-gray-50 dark:bg-[#1C1C1E] text-gray-900 dark:text-white rounded-2xl px-5 py-4 outline-none border border-transparent dark:border-[#2C2C2E]" /><input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Password" className="w-full bg-gray-50 dark:bg-[#1C1C1E] text-gray-900 dark:text-white rounded-2xl px-5 py-4 outline-none border border-transparent dark:border-[#2C2C2E]" /></div>
            <div className="mt-4 text-right"><button onClick={async () => { vibrate(); if(email) { try { await sendPasswordResetEmail(auth, email); setError("Reset email sent!"); } catch(e) { setError(e.message); } } else setError("Enter email first."); }} className="text-emerald-500 text-sm font-bold">Forgot Password?</button></div>
            <button onClick={() => handleAuth('google')} disabled={loading} className="w-full mt-8 flex items-center justify-center gap-3 py-4 border border-gray-200 dark:border-[#2C2C2E] text-gray-800 dark:text-white font-bold rounded-2xl active:scale-95 disabled:opacity-70 transition-transform"><svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Continue with Google</button>
          </div>
          <div className="p-6 pb-safe"><button onClick={() => handleAuth('email')} disabled={loading} className="w-full flex justify-center py-4 bg-gray-900 dark:bg-white dark:text-gray-900 text-white font-bold rounded-2xl active:scale-95 disabled:opacity-70 transition-transform">{loading ? <Loader2 className="w-6 h-6 animate-spin" /> : 'Log In'}</button></div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('ServiceWorker registration failed: ', err));
      });
    }
  </script>
</body>
</html>
